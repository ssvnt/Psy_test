version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: psytest
    ports: ['5432:5432']
  app:
    image: node:20
    working_dir: /app
    volumes: ['.:/app']
    command: bash -lc "npm install && npx prisma migrate deploy && npm run db:seed && npm run dev"
    ports: ['3000:3000']
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/psytest
      APP_URL: http://localhost:3000
    depends_on: [db]
